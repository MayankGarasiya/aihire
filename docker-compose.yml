services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    volumes:
      - ./backend:/app

  celery_worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    command: celery -A aihire worker -l INFO
    depends_on:
      - rabbitmq
      - backend
    volumes:
      - ./backend:/app

  celery_beat:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    command: celery -A aihire beat -l INFO
    depends_on:
      - rabbitmq
      - backend
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

