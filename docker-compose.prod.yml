services:
  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: gunicorn aihire.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    depends_on:
      - rabbitmq

  celery_worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: celery -A aihire worker -l INFO
    depends_on:
      - rabbitmq
      - backend

  celery_beat:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: celery -A aihire beat -l INFO
    depends_on:
      - rabbitmq
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

